# Server Port
server.port=8080

# Database Configuration (H2 File-based for out-of-the-box ease)
spring.datasource.url=jdbc:h2:file:./data/hiremate_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Database Configuration (MySQL - Commented out)
# spring.datasource.url=jdbc:mysql://localhost:3306/hiremate_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL dialect, use: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Upload File Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Security Configurations
# Base64 encoded 512-bit secret key (safe for HS256/HS512)
jwt.secret=Mjg0YjVkNmQ4NDVlYzMyZTNkOWFjYTcwNzEwNmUxNGE3OWUwODlkODNiNzU5YWIzYjhiMDQ1OTBiNWRjY2JhMA==
# 1 day expiration in milliseconds
jwt.expiration=86400000

# OpenAI API Settings
# If openai.key is set to "mock" or left empty/invalid, HireMate AI operates in fallback simulated mode.
openai.key=mock
openai.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# OpenAPI / Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
