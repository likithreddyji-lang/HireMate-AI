# Server Port — Render sets PORT automatically via env var
server.port=${PORT:8080}

# ── Database Configuration ─────────────────────────────────────────────────
# Defaults to H2 in-memory (works on Render free tier, resets on restart).
# Override via Render env vars to use MySQL for persistent data.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:hiremate_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# H2 Console (only useful locally — keep disabled in production)
spring.h2.console.enabled=false

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ── File Upload Limits ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── JWT Security ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:Mjg0YjVkNmQ4NDVlYzMyZTNkOWFjYTcwNzEwNmUxNGE3OWUwODlkODNiNzU5YWIzYjhiMDQ1OTBiNWRjY2JhMA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── OpenAI API ────────────────────────────────────────────────────────────
# Set OPENAI_KEY to your real key, or leave as "mock" for simulated AI mode
openai.key=${OPENAI_KEY:mock}
openai.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
